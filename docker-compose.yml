services:
  adapter:
    build:
      context: ./backend
      dockerfile: services/adapter/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8080"
      SHARDMAP_URL: "http://shardmap:8081"
      Omnishard_DB_PATH: "/app/data/Omnishard.db"
    volumes:
      - adapter_data:/app/data
    ports:
      - "8080:8080"
    profiles: ["backend", "full"]

  shardmap:
    build:
      context: ./backend
      dockerfile: services/shardmap/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8081"
      Omnishard_SHARDMAP_DB_PATH: "/app/data/Omnishard-shardmap.db"
    volumes:
      - shardmap_data:/app/data
    ports:
      - "8081:8081"
    profiles: ["backend", "full"]

  sharding:
    build:
      context: ./backend
      dockerfile: services/sharding/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8083"
    ports:
      - "8083:8083"
    profiles: ["backend", "full"]

  orchestrator:
    build:
      context: ./backend
      dockerfile: services/orchestrator/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8082"
      ADAPTER_URL: "http://adapter:8080"
      SHARDMAP_URL: "http://shardmap:8081"
      SHARDING_URL: "http://sharding:8083"
    depends_on:
      adapter:
        condition: service_started
      shardmap:
        condition: service_started
      sharding:
        condition: service_started
    ports:
      - "8082:8082"
    profiles: ["backend", "full"]

  gateway:
    build:
      context: ./backend
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      ORCHESTRATOR_URL: "http://orchestrator:8082"
      ADAPTER_URL: "http://adapter:8080"
    depends_on:
      adapter:
        condition: service_started
      shardmap:
        condition: service_started
      sharding:
        condition: service_started
      orchestrator:
        condition: service_started
    ports:
      - "8084:8084"
    profiles: ["backend", "full"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8080"
    restart: unless-stopped
    environment:
      PORT: "3000"
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      API_INTERNAL_URL: "http://adapter:8080"
      GATEWAY_URL: "http://gateway:8084"
      NEXT_PUBLIC_BETTER_AUTH_URL: "http://localhost:3000"
    depends_on:
      adapter:
        condition: service_started
      orchestrator:
        condition: service_started
      gateway:
        condition: service_started
    ports:
      - "3000:3000"
    profiles: ["full"]

volumes:
  adapter_data:
  shardmap_data:
