services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nebula
      POSTGRES_USER: nebula
      POSTGRES_PASSWORD: nebula
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/init-local.sql:/docker-entrypoint-initdb.d/001-init-local.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebula -d nebula"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["backend", "full"]

  adapter:
    build:
      context: ./backend
      dockerfile: services/adapter/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    profiles: ["backend", "full"]

  shardmap:
    build:
      context: ./backend
      dockerfile: services/shardmap/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    profiles: ["backend", "full"]

  sharding:
    build:
      context: ./backend
      dockerfile: services/sharding/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8083"
    ports:
      - "8083:8083"
    profiles: ["backend", "full"]

  orchestrator:
    build:
      context: ./backend
      dockerfile: services/orchestrator/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8082"
      ADAPTER_URL: "http://adapter:8080"
      SHARDMAP_URL: "http://shardmap:8081"
      SHARDING_URL: "http://sharding:8083"
    depends_on:
      adapter:
        condition: service_started
      shardmap:
        condition: service_started
      sharding:
        condition: service_started
    ports:
      - "8082:8082"
    profiles: ["backend", "full"]

  gateway:
    build:
      context: ./backend
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      ORCHESTRATOR_URL: "http://orchestrator:8082"
      ADAPTER_URL: "http://adapter:8080"
    depends_on:
      adapter:
        condition: service_started
      shardmap:
        condition: service_started
      sharding:
        condition: service_started
      orchestrator:
        condition: service_started
    ports:
      - "8084:8084"
    profiles: ["backend", "full"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8080"
    restart: unless-stopped
    environment:
      PORT: "3000"
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      NEXT_PUBLIC_BETTER_AUTH_URL: "http://localhost:3000"
    depends_on:
      adapter:
        condition: service_started
      orchestrator:
        condition: service_started
      gateway:
        condition: service_started
    ports:
      - "3000:3000"
    profiles: ["full"]

volumes:
  postgres_data:
