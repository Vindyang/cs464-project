services:
  monolith:
    image: ${IMAGE_NAMESPACE:?Set IMAGE_NAMESPACE}/omnishard-monolith:${OMNISHARD_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: "8080"
      MONOLITH_MOCK_MODE: "false"
      Omnishard_DB_PATH: "/app/data/Omnishard.db"
      Omnishard_SHARDMAP_DB_PATH: "/app/data/Omnishard-shardmap.db"
    volumes:
      - monolith_data:/app/data
    ports:
      - "8080:8080"

  frontend:
    image: ${IMAGE_NAMESPACE:?Set IMAGE_NAMESPACE}/omnishard-frontend:${OMNISHARD_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: "3000"
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      API_INTERNAL_URL: "http://monolith:8080"
      GATEWAY_URL: "http://monolith:8080"
      NEXT_PUBLIC_BETTER_AUTH_URL: "http://localhost:3000"
    depends_on:
      monolith:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  monolith_data: