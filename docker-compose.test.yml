services:
  adapter-test:
    build:
      context: ./backend/microservice
      dockerfile: services/adapter/Dockerfile
    restart: "no"
    environment:
      PORT: "8080"
      SHARDMAP_URL: "http://shardmap-test:8081"
      Omnishard_DB_PATH: "/app/data/Omnishard-e2e-adapter.db"
      ADAPTER_MOCK_MODE: "true"
    volumes:
      - adapter_test_data:/app/data
    ports:
      - "19080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 15
    profiles: ["e2e"]

  shardmap-test:
    build:
      context: ./backend/microservice
      dockerfile: services/shardmap/Dockerfile
    restart: "no"
    environment:
      PORT: "8081"
      Omnishard_SHARDMAP_DB_PATH: "/app/data/Omnishard-e2e-shardmap.db"
    volumes:
      - shardmap_test_data:/app/data
    ports:
      - "19081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 15
    profiles: ["e2e"]

  sharding-test:
    build:
      context: ./backend/microservice
      dockerfile: services/sharding/Dockerfile
    restart: "no"
    environment:
      PORT: "8083"
    ports:
      - "19083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/api/sharding/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 15
    profiles: ["e2e"]

  orchestrator-test:
    build:
      context: ./backend/microservice
      dockerfile: services/orchestrator/Dockerfile
    restart: "no"
    environment:
      PORT: "8082"
      ADAPTER_URL: "http://adapter-test:8080"
      SHARDMAP_URL: "http://shardmap-test:8081"
      SHARDING_URL: "http://sharding-test:8083"
    depends_on:
      adapter-test:
        condition: service_healthy
      shardmap-test:
        condition: service_healthy
      sharding-test:
        condition: service_healthy
    ports:
      - "19082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
    profiles: ["e2e"]

  gateway-test:
    build:
      context: ./backend/microservice
      dockerfile: services/gateway/Dockerfile
    restart: "no"
    environment:
      ORCHESTRATOR_URL: "http://orchestrator-test:8082"
      ADAPTER_URL: "http://adapter-test:8080"
    depends_on:
      orchestrator-test:
        condition: service_healthy
      adapter-test:
        condition: service_healthy
    ports:
      - "19084:8084"
    profiles: ["e2e"]

volumes:
  adapter_test_data:
  shardmap_test_data:
