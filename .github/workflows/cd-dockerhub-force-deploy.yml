name: CD - Force Publish Registry Images

on:
  workflow_dispatch:
    inputs:
      deploy_full_microservices:
        description: Build and push all microservices images (adapter, shardmap, sharding, orchestrator, gateway, frontend)
        required: false
        default: false
        type: boolean
      deploy_all_in_one:
        description: Build and push all-in-one image
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  validate-inputs:
    name: Validate selections
    runs-on: ubuntu-latest
    outputs:
      image_namespace: ${{ steps.namespace.outputs.image_namespace }}
    steps:
      - name: Resolve image namespace
        id: namespace
        run: echo "image_namespace=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Require at least one release target
        run: |
          if [ "${{ inputs.deploy_full_microservices }}" != "true" ] && [ "${{ inputs.deploy_all_in_one }}" != "true" ]; then
            echo "Select at least one release target to publish."
            exit 1
          fi

  publish-full-microservices:
    name: Publish full microservices images
    runs-on: ubuntu-latest
    needs: validate-inputs
    if: inputs.deploy_full_microservices
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: adapter
            image_name: omnishard-adapter
            context: ./backend
            dockerfile: ./backend/services/adapter/Dockerfile
          - job_name: shardmap
            image_name: omnishard-shardmap
            context: ./backend
            dockerfile: ./backend/services/shardmap/Dockerfile
          - job_name: sharding
            image_name: omnishard-sharding
            context: ./backend
            dockerfile: ./backend/services/sharding/Dockerfile
          - job_name: orchestrator
            image_name: omnishard-orchestrator
            context: ./backend
            dockerfile: ./backend/services/orchestrator/Dockerfile
          - job_name: gateway
            image_name: omnishard-gateway
            context: ./backend
            dockerfile: ./backend/services/gateway/Dockerfile
          - job_name: frontend
            image_name: omnishard-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_URL=http://localhost:8080
    env:
      IMAGE_NAME: ${{ needs.validate-inputs.outputs.image_namespace }}/${{ matrix.image_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args || '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-all-in-one:
    name: Publish all-in-one image
    runs-on: ubuntu-latest
    needs: validate-inputs
    if: inputs.deploy_all_in_one
    env:
      IMAGE_NAME: ${{ needs.validate-inputs.outputs.image_namespace }}/omnishard-all-in-one
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/images/all-in-one/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}