name: CI — Integration

on:
  pull_request:
    branches: [main]

jobs:
  integration-contracts:
    name: Orchestrator contract tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Vet integration tests
        run: go vet ./tests/integration/...

      - name: Run integration tests
        run: go test ./tests/integration/... -count=1 -v -timeout 120s
