name: CI — Shared Code Tests

on:
  push:
    branches: [main, microservices, "feature/**"]
    paths:
      - 'backend/services/shared/**'
      - '.github/workflows/ci-shared-tests.yml'
  pull_request:
    branches: [main, microservices, "feature/**"]
    paths:
      - 'backend/services/shared/**'
      - '.github/workflows/ci-shared-tests.yml'

jobs:
  # Run all integration tests when shared code changes — shared touches all services.
  integration-tests:
    name: Integration tests (shared code change)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run integration tests
        run: go test ./tests/integration/... -count=1 -v -timeout 120s

  # Run e2e Docker tests when shared code changes.
  e2e-tests:
    name: E2E tests (shared code change)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run e2e tests
        working-directory: ./backend
        run: go test -tags e2e ./tests/e2e/... -count=1 -v -timeout 300s
