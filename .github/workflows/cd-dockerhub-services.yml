name: CD - Publish Service Images

on:
  push:
    branches: [main, microservices, "docker-hub/**", "feature/**"]
    paths:
      - 'backend/services/**'
      - 'backend/go.mod'
      - 'backend/go.sum'
      - 'docker-compose.yml'
      - '.github/workflows/cd-dockerhub-services.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      adapter: ${{ steps.changes.outputs.adapter }}
      orchestrator: ${{ steps.changes.outputs.orchestrator }}
      shardmap: ${{ steps.changes.outputs.shardmap }}
      sharding: ${{ steps.changes.outputs.sharding }}
      gateway: ${{ steps.changes.outputs.gateway }}
      shared: ${{ steps.changes.outputs.shared }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            adapter:
              - 'backend/services/adapter/**'
            orchestrator:
              - 'backend/services/orchestrator/**'
            shardmap:
              - 'backend/services/shardmap/**'
            sharding:
              - 'backend/services/sharding/**'
            gateway:
              - 'backend/services/gateway/**'
            shared:
              - 'backend/services/shared/**'

  publish-adapter:
    name: Publish adapter image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.adapter == 'true' || needs.detect-changes.outputs.shared == 'true'
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-adapter
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/services/adapter/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-orchestrator:
    name: Publish orchestrator image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.orchestrator == 'true' || needs.detect-changes.outputs.shared == 'true'
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/services/orchestrator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-shardmap:
    name: Publish shardmap image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.shardmap == 'true' || needs.detect-changes.outputs.shared == 'true'
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-shardmap
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/services/shardmap/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-sharding:
    name: Publish sharding image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.sharding == 'true' || needs.detect-changes.outputs.shared == 'true'
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-sharding
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/services/sharding/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-gateway:
    name: Publish gateway image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/services/gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

