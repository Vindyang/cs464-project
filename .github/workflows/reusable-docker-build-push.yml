name: Reusable - Docker Build Push

on:
  workflow_call:
    inputs:
      image_name:
        description: Fully-qualified image name.
        required: true
        type: string
      context:
        description: Docker build context.
        required: true
        type: string
      dockerfile:
        description: Dockerfile path.
        required: true
        type: string
      image_tag:
        description: Immutable image tag to publish or build.
        required: true
        type: string
      checkout_ref:
        description: Git ref to check out before building.
        required: false
        default: ''
        type: string
      build_args:
        description: Optional multiline Docker build args.
        required: false
        default: ''
        type: string
      push_image:
        description: Whether to push the image to the container registry.
        required: false
        default: false
        type: boolean
      include_latest_tag:
        description: Whether to also publish the latest tag.
        required: false
        default: true
        type: boolean
      platforms:
        description: Target image platforms.
        required: false
        default: 'linux/amd64,linux/arm64'
        type: string
      timeout_minutes:
        description: Job timeout in minutes.
        required: false
        default: 30
        type: number

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: tags
        run: |
          {
            echo 'tags<<EOF'
            if [ "${{ inputs.include_latest_tag }}" = "true" ]; then
              echo "${{ inputs.image_name }}:latest"
            fi
            echo "${{ inputs.image_name }}:${{ inputs.image_tag }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        if: inputs.push_image
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push_image }}
          platforms: ${{ inputs.platforms }}
          build-args: ${{ inputs.build_args }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}