name: Reusable - Docker Build Push

on:
  workflow_call:
    inputs:
      image_name:
        description: Fully-qualified image name.
        required: true
        type: string
      context:
        description: Docker build context.
        required: true
        type: string
      dockerfile:
        description: Dockerfile path.
        required: true
        type: string
      image_tag:
        description: Immutable image tag to publish or build.
        required: true
        type: string
      checkout_ref:
        description: Git ref to check out before building.
        required: false
        default: ''
        type: string
      build_args:
        description: Optional multiline Docker build args.
        required: false
        default: ''
        type: string
      push_image:
        description: Whether to push the image to Docker Hub.
        required: false
        default: false
        type: boolean
      timeout_minutes:
        description: Job timeout in minutes.
        required: false
        default: 30
        type: number

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: tags
        run: |
          printf 'tags<<EOF\n%s:latest\n%s:%s\nEOF\n' "${{ inputs.image_name }}" "${{ inputs.image_name }}" "${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        if: inputs.push_image
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push_image }}
          build-args: ${{ inputs.build_args }}
          tags: ${{ steps.tags.outputs.tags }}