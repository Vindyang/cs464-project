name: CI - Dev

on:
  push:
    branches: [dev]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/**'
      - '.github/workflows/**'
  pull_request:
    branches: [dev]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/**'
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/reusable-ci.yml