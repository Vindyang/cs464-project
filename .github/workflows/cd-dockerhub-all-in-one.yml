name: CD - Publish All-in-One Image

on:
  push:
    branches: [main, microservices, "docker-hub/**", "feature/**"]
    paths:
      - 'backend/services/**'
      - 'backend/go.mod'
      - 'backend/go.sum'
      - 'frontend/**'
      - 'deploy/images/all-in-one/**'
      - '.github/workflows/cd-dockerhub-all-in-one.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-all-in-one:
    name: Publish all-in-one image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-all-in-one
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/images/all-in-one/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}