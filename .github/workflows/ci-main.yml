name: CI/CD - Main

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/**'
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  pipeline-policy:
    name: Resolve pipeline policy
    runs-on: ubuntu-latest
    outputs:
      deploy_enabled: ${{ steps.policy.outputs.deploy_enabled }}
      push_images: ${{ steps.policy.outputs.push_images }}
      image_tag: ${{ steps.policy.outputs.image_tag }}
      checkout_ref: ${{ steps.policy.outputs.checkout_ref }}
    steps:
      - name: Resolve branch policy
        id: policy
        run: |
          deploy_enabled=false
          push_images=false
          image_tag="${{ github.sha }}"
          checkout_ref="${{ github.sha }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            image_tag="${{ github.event.pull_request.head.sha }}"
            checkout_ref="${{ github.event.pull_request.head.sha }}"
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            deploy_enabled=true
            push_images=true
          fi

          echo "deploy_enabled=$deploy_enabled" >> "$GITHUB_OUTPUT"
          echo "push_images=$push_images" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

  ci:
    name: CI
    uses: ./.github/workflows/reusable-ci.yml

  deploy-adapter:
    name: Deploy adapter image
    needs: [pipeline-policy, ci]
    if: always() && needs.ci.result == 'success' && needs.pipeline-policy.outputs.deploy_enabled == 'true' && (needs.ci.outputs.adapter == 'true' || needs.ci.outputs.shared == 'true')
    uses: ./.github/workflows/reusable-docker-build-push.yml
    secrets: inherit
    with:
      image_name: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-adapter
      context: ./backend
      dockerfile: ./backend/services/adapter/Dockerfile
      image_tag: ${{ needs.pipeline-policy.outputs.image_tag }}
      checkout_ref: ${{ needs.pipeline-policy.outputs.checkout_ref }}
      push_image: ${{ needs.pipeline-policy.outputs.push_images == 'true' }}

  deploy-orchestrator:
    name: Deploy orchestrator image
    needs: [pipeline-policy, ci]
    if: always() && needs.ci.result == 'success' && needs.pipeline-policy.outputs.deploy_enabled == 'true' && (needs.ci.outputs.orchestrator == 'true' || needs.ci.outputs.shared == 'true')
    uses: ./.github/workflows/reusable-docker-build-push.yml
    secrets: inherit
    with:
      image_name: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-orchestrator
      context: ./backend
      dockerfile: ./backend/services/orchestrator/Dockerfile
      image_tag: ${{ needs.pipeline-policy.outputs.image_tag }}
      checkout_ref: ${{ needs.pipeline-policy.outputs.checkout_ref }}
      push_image: ${{ needs.pipeline-policy.outputs.push_images == 'true' }}

  deploy-shardmap:
    name: Deploy shardmap image
    needs: [pipeline-policy, ci]
    if: always() && needs.ci.result == 'success' && needs.pipeline-policy.outputs.deploy_enabled == 'true' && (needs.ci.outputs.shardmap == 'true' || needs.ci.outputs.shared == 'true')
    uses: ./.github/workflows/reusable-docker-build-push.yml
    secrets: inherit
    with:
      image_name: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-shardmap
      context: ./backend
      dockerfile: ./backend/services/shardmap/Dockerfile
      image_tag: ${{ needs.pipeline-policy.outputs.image_tag }}
      checkout_ref: ${{ needs.pipeline-policy.outputs.checkout_ref }}
      push_image: ${{ needs.pipeline-policy.outputs.push_images == 'true' }}

  deploy-sharding:
    name: Deploy sharding image
    needs: [pipeline-policy, ci]
    if: always() && needs.ci.result == 'success' && needs.pipeline-policy.outputs.deploy_enabled == 'true' && (needs.ci.outputs.sharding == 'true' || needs.ci.outputs.shared == 'true')
    uses: ./.github/workflows/reusable-docker-build-push.yml
    secrets: inherit
    with:
      image_name: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-sharding
      context: ./backend
      dockerfile: ./backend/services/sharding/Dockerfile
      image_tag: ${{ needs.pipeline-policy.outputs.image_tag }}
      checkout_ref: ${{ needs.pipeline-policy.outputs.checkout_ref }}
      push_image: ${{ needs.pipeline-policy.outputs.push_images == 'true' }}

  deploy-gateway:
    name: Deploy gateway image
    needs: [pipeline-policy, ci]
    if: always() && needs.ci.result == 'success' && needs.pipeline-policy.outputs.deploy_enabled == 'true' && needs.ci.outputs.gateway == 'true'
    uses: ./.github/workflows/reusable-docker-build-push.yml
    secrets: inherit
    with:
      image_name: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-gateway
      context: ./backend
      dockerfile: ./backend/services/gateway/Dockerfile
      image_tag: ${{ needs.pipeline-policy.outputs.image_tag }}
      checkout_ref: ${{ needs.pipeline-policy.outputs.checkout_ref }}
      push_image: ${{ needs.pipeline-policy.outputs.push_images == 'true' }}

  deploy-frontend:
    name: Deploy frontend image
    needs: [pipeline-policy, ci]
    if: always() && needs.ci.result == 'success' && needs.pipeline-policy.outputs.deploy_enabled == 'true' && needs.ci.outputs.frontend == 'true'
    uses: ./.github/workflows/reusable-docker-build-push.yml
    secrets: inherit
    with:
      image_name: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-frontend
      context: ./frontend
      dockerfile: ./frontend/Dockerfile
      image_tag: ${{ needs.pipeline-policy.outputs.image_tag }}
      checkout_ref: ${{ needs.pipeline-policy.outputs.checkout_ref }}
      build_args: |
        NEXT_PUBLIC_API_URL=http://localhost:8080
      push_image: ${{ needs.pipeline-policy.outputs.push_images == 'true' }}

  deploy-all-in-one:
    name: Deploy all-in-one image
    needs: [pipeline-policy, ci]
    if: always() && needs.ci.result == 'success' && needs.pipeline-policy.outputs.deploy_enabled == 'true' && (needs.ci.outputs.backend_any == 'true' || needs.ci.outputs.frontend == 'true' || needs.ci.outputs.all_in_one_assets == 'true')
    uses: ./.github/workflows/reusable-docker-build-push.yml
    secrets: inherit
    with:
      image_name: ${{ vars.DOCKERHUB_NAMESPACE }}/omnishard-all-in-one
      context: .
      dockerfile: ./deploy/images/all-in-one/Dockerfile
      image_tag: ${{ needs.pipeline-policy.outputs.image_tag }}
      checkout_ref: ${{ needs.pipeline-policy.outputs.checkout_ref }}
      build_args: |
        NEXT_PUBLIC_API_URL=http://localhost:8080
      push_image: ${{ needs.pipeline-policy.outputs.push_images == 'true' }}
